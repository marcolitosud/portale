<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allestimento — Effe Printing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/qr-creator@1.0.0/dist/qr-creator.min.js"></script>
<style>
:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --surface2: #F0EEE9;
  --border: rgba(0,0,0,.10);
  --border2: rgba(0,0,0,.18);
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #A8A59E;
  --green-dark: #085041;
  --green-mid: #0F6E56;
  --green-accent: #1D9E75;
  --green-light: #9FE1CB;
  --green-bg: #E1F5EE;
  --radius: 10px;
  --radius-lg: 14px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--green-dark);
}
.login-box {
  background: var(--surface); border-radius: 16px; padding: 2.5rem 2rem;
  width: 100%; max-width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.login-logo { display: flex; align-items: center; gap: .7rem; margin-bottom: 1.75rem; }
.login-logo-mark { width: 36px; height: 36px; background: var(--green-dark); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.login-logo-mark svg { width: 20px; height: 20px; }
.login-logo-name { font-size: 16px; font-weight: 600; }
.login-title { font-size: 20px; font-weight: 600; margin-bottom: .35rem; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.75rem; }
.login-field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: 1rem; }
.login-field label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.login-field input {
  padding: 10px 12px; border: 1px solid var(--border2); border-radius: var(--radius);
  font-size: 14px; font-family: var(--sans); background: var(--surface); color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.login-field input:focus { border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(29,158,117,.12); }
.login-err { font-size: 12px; color: #c0392b; background: #fdecea; border-radius: 7px; padding: 8px 10px; margin-bottom: .75rem; display: none; }
.btn-login {
  background: var(--green-dark); color: var(--green-light); border: none; border-radius: var(--radius);
  padding: 12px; font-size: 14px; font-weight: 500; font-family: var(--sans); cursor: pointer;
  width: 100%; transition: background .15s;
}
.btn-login:hover { background: var(--green-mid); color: #fff; }

/* ── APP ── */
#appScreen { display: none; }
.app { display: grid; grid-template-columns: 400px 1fr; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto;
}
.sidebar-head { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: .6rem; margin-bottom: .15rem; }
.logo-mark { width: 28px; height: 28px; background: var(--green-dark); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.logo-mark svg { width: 16px; height: 16px; }
.logo-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.logo-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: 40px; }
.sidebar-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; flex: 1; }
.sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: .6rem; flex-shrink: 0; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); }
.field { display: flex; flex-direction: column; gap: .3rem; }
.field label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .03em; text-transform: uppercase; }
.field input {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius);
  font-size: 13px; font-family: var(--sans); background: var(--surface); color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.field input:focus { border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(29,158,117,.12); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.versioni-cols { display: grid; grid-template-columns: 24px 1fr 100px 24px; gap: .4rem; padding: 0 .05rem; }
.versioni-cols span { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.versioni-list { display: flex; flex-direction: column; gap: .45rem; }
.ver-row {
  display: grid; grid-template-columns: 24px 1fr 100px 24px; gap: .4rem; align-items: center;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: .5rem .65rem; transition: border-color .15s;
}
.ver-row:focus-within { border-color: var(--green-accent); }
.ver-idx { font-size: 10px; font-weight: 600; color: var(--text3); font-family: var(--mono); text-align: center; }
.ver-row input {
  padding: 5px 7px; font-size: 12px; border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); color: var(--text); font-family: var(--mono); outline: none; width: 100%;
  transition: border-color .15s;
}
.ver-row input:focus { border-color: var(--green-accent); }
.btn-remove {
  background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; line-height: 1;
  display: flex; align-items: center; justify-content: center; border-radius: 5px; padding: 2px;
  transition: color .12s, background .12s;
}
.btn-remove:hover { color: #c0392b; background: #fdecea; }
.btn-add {
  background: none; border: 1px dashed var(--border2); border-radius: var(--radius); padding: 7px;
  font-size: 12px; color: var(--green-mid); cursor: pointer; width: 100%; font-family: var(--sans);
  font-weight: 500; transition: background .12s, border-color .12s;
}
.btn-add:hover { background: var(--green-bg); border-color: var(--green-accent); }
.stats {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: .7rem .9rem; font-size: 12px; color: var(--text2); line-height: 1.95; display: none;
}
.stats strong { color: var(--text); font-weight: 500; }
.stats-divider { border: none; border-top: 1px solid var(--border); margin: .3rem 0; }
.btn-primary {
  background: var(--green-dark); color: var(--green-light); border: none; border-radius: var(--radius);
  padding: 11px; font-size: 14px; font-weight: 500; font-family: var(--sans); cursor: pointer;
  width: 100%; transition: background .15s, transform .1s;
}
.btn-primary:hover { background: var(--green-mid); color: #fff; }
.btn-primary:active { transform: scale(.99); }
.btn-ghost {
  background: none; border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 8px 14px; font-size: 12px; font-family: var(--sans); cursor: pointer; color: var(--text2);
  transition: background .12s;
}
.btn-ghost:hover { background: var(--surface2); }
.btn-link {
  background: none; border: none; cursor: pointer; font-size: 12px; font-family: var(--sans);
  color: var(--green-mid); text-decoration: underline; text-underline-offset: 2px; padding: 0;
}

/* MAIN */
.main { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border); padding: .8rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  position: sticky; top: 0; z-index: 5; flex-shrink: 0;
}
.topbar-info { font-size: 12px; color: var(--text2); flex: 1; }
.topbar-info strong { color: var(--text); }
.topbar-actions { display: flex; align-items: center; gap: .5rem; }
.user-badge {
  font-size: 11px; color: var(--text3); font-family: var(--mono);
  display: flex; align-items: center; gap: .4rem;
}
.btn-logout {
  background: none; border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 5px 10px; font-size: 11px; font-family: var(--sans); cursor: pointer; color: var(--text2);
  transition: background .12s;
}
.btn-logout:hover { background: #fdecea; color: #c0392b; border-color: #c0392b; }

/* DASHBOARD */
.dashboard {
  background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem;
  display: flex; align-items: center; gap: .75rem; flex-shrink: 0;
}
.dash-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-right: .25rem; }
.dash-btn {
  display: flex; align-items: center; gap: .4rem;
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 7px 13px; font-size: 12px; font-family: var(--sans); font-weight: 500;
  color: var(--text2); cursor: pointer; transition: background .12s, border-color .12s, color .12s;
}
.dash-btn:hover { background: var(--green-bg); border-color: var(--green-accent); color: var(--green-dark); }
.dash-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.dash-stat {
  margin-left: auto; display: flex; align-items: center; gap: 1.25rem;
}
.dash-stat-item { text-align: right; }
.dash-stat-val { font-size: 18px; font-weight: 600; color: var(--text); font-family: var(--mono); line-height: 1; }
.dash-stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-top: 2px; }

.preview { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
.empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: .75rem; color: var(--text3); padding: 4rem;
}
.empty p { font-size: 13px; }

/* VERSIONE SECTION */
.ver-section { display: flex; flex-direction: column; gap: .75rem; }
.ver-section-head { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
.ver-badge {
  background: var(--green-dark); color: var(--green-light); font-size: 10px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-family: var(--mono);
}
.ver-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* CARDS GRID */
.cards-grid { display: flex; flex-wrap: wrap; gap: 1rem; }

/* LABEL CARD */
.label-card {
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg);
  overflow: hidden; transition: box-shadow .15s;
  width: 280px; min-height: 396px; display: flex; flex-direction: column;
}
.label-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.09); }
.label-header { background: var(--green-dark); padding: .75rem 1.1rem; flex-shrink: 0; }
.lh-logo { height: 36px; object-fit: contain; object-position: left; margin-bottom: .3rem; }
.lh-eyebrow { font-size: 7px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--green-accent); font-family: var(--mono); margin-bottom: .15rem; }
.lh-cliente { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.15; letter-spacing: -.01em; }
.lh-commessa { font-size: 10px; color: var(--green-light); font-family: var(--mono); margin-top: .1rem; opacity: .85; font-weight: 600; }
.label-body { padding: .85rem 1.1rem; display: flex; flex-direction: column; gap: .55rem; flex: 1; }
.versione-pill {
  display: inline-flex; align-items: center; background: var(--green-bg); color: var(--green-mid);
  font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px; font-family: var(--mono); width: fit-content;
}
.label-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: .35rem; }
.lf { background: var(--surface2); border-radius: 7px; padding: .35rem .5rem; }
.lf-n { font-size: 7px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 600; }
.lf-v { font-size: 18px; font-weight: 600; color: var(--text); font-family: var(--mono); margin-top: 1px; }
.label-bottom { display: grid; grid-template-columns: 1fr 96px; border-top: 1px solid var(--border); flex-shrink: 0; margin-top: auto; }
.bancale-section { padding: .75rem 1.1rem; display: flex; align-items: center; }
.bancale-num-block { display: flex; flex-direction: column; }
.b-eyebrow { font-size: 7px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 600; margin-bottom: 1px; }
.b-num { font-size: 38px; font-weight: 600; color: var(--text); font-family: var(--mono); line-height: 1; }
.b-tot { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.qr-cell { background: var(--green-bg); display: flex; align-items: center; justify-content: center; padding: .6rem; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border-radius: var(--radius-lg); width: 96%; max-width: 640px;
  max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.modal-head h2 { font-size: 14px; font-weight: 600; }
.btn-close { background: none; border: none; cursor: pointer; font-size: 20px; line-height: 1; color: var(--text2); }
.modal-body { overflow-y: auto; flex: 1; }

/* STORICO PER MESI */
.storico-search { padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); }
.storico-search input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius);
  font-size: 13px; font-family: var(--sans); background: var(--surface2); color: var(--text);
  outline: none; transition: border-color .15s;
}
.storico-search input:focus { border-color: var(--green-accent); background: var(--surface); }
.storico-month-group { border-bottom: 1px solid var(--border); }
.storico-month-head {
  padding: .65rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; transition: background .1s;
  background: var(--surface2);
}
.storico-month-head:hover { background: var(--green-bg); }
.storico-month-name { font-size: 12px; font-weight: 600; color: var(--text); text-transform: capitalize; }
.storico-month-count { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.storico-month-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }
.storico-month-arrow.open { transform: rotate(90deg); }
.storico-month-rows { display: none; }
.storico-month-rows.open { display: block; }
.storico-row {
  padding: .65rem 1.25rem; border-top: 1px solid var(--border); cursor: pointer;
  font-size: 12px; transition: background .1s; display: flex; align-items: center; gap: .75rem;
}
.storico-row:hover { background: var(--surface2); }
.storico-row-info { flex: 1; }
.storico-row-title { font-weight: 600; color: var(--text); }
.storico-row-meta { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.storico-row-action {
  background: var(--green-bg); color: var(--green-mid); border: none; border-radius: 7px;
  padding: 5px 10px; font-size: 11px; font-family: var(--sans); font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: background .1s;
}
.storico-row-action:hover { background: var(--green-accent); color: #fff; }
.storico-empty { color: var(--text3); font-size: 13px; text-align: center; padding: 3rem 0; }

/* PRINT */
@media print {
  @page { size: A4 portrait; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #fff; }
  .sidebar, .topbar, .dashboard { display: none !important; }
  .app { display: block; }
  .main { display: block; }
  .preview { padding: 0; gap: 0; }
  .ver-section { display: contents; }
  .ver-section-head { display: none; }
  .cards-grid { display: contents; }
  .label-card {
    width: 210mm; height: 297mm; border-radius: 0; border: none;
    box-shadow: none; break-after: page; page-break-after: always;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .label-header { background: #085041 !important; padding: 2.5rem 3rem 2rem; flex-shrink: 0; }
  .lh-logo { height: 60px; margin-bottom: .6rem; }
  .lh-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; color: #1D9E75 !important; font-family: monospace; margin-bottom: .4rem; }
  .lh-cliente { font-size: 36px; font-weight: 600; color: #fff !important; line-height: 1.15; }
  .lh-commessa { font-size: 16px; color: #9FE1CB !important; font-family: monospace; margin-top: .2rem; }
  .label-body { padding: 2rem 3rem; display: flex; flex-direction: column; gap: 1.25rem; flex: 1; }
  .versione-pill { display: inline-flex; background: #E1F5EE !important; color: #0F6E56 !important; font-size: 16px; font-weight: 600; padding: 6px 16px; border-radius: 20px; font-family: monospace; }
  .label-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
  .lf { background: #F0EEE9 !important; border-radius: 10px; padding: 1rem 1.25rem; }
  .lf-n { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #A8A59E !important; font-weight: 600; }
  .lf-v { font-size: 32px; font-weight: 600; color: #1A1916 !important; font-family: monospace; margin-top: 4px; }
  .label-bottom { display: grid; grid-template-columns: 1fr 220px; border-top: 1px solid rgba(0,0,0,.10); flex-shrink: 0; margin-top: auto; }
  .bancale-section { padding: 2rem 3rem; }
  .b-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #A8A59E !important; font-weight: 600; margin-bottom: 2px; }
  .b-num { font-size: 80px; font-weight: 600; color: #1A1916 !important; font-family: monospace; line-height: 1; }
  .b-tot { font-size: 16px; color: #A8A59E !important; font-family: monospace; margin-top: 4px; }
  .qr-cell { background: #E1F5EE !important; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .qr-cell svg { width: 160px !important; height: 160px !important; }
}
</style>
</head>
<body>



<!-- APP -->
<div id="appScreen" style="display:block">
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="5" width="14" height="10" rx="1.5" fill="#9FE1CB"/>
            <path d="M4 5V3.5A1.5 1.5 0 015.5 2h5A1.5 1.5 0 0112 3.5V5" stroke="#085041" stroke-width="1.4"/>
            <line x1="4" y1="9" x2="12" y2="9" stroke="#085041" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="4" y1="11.5" x2="9" y2="11.5" stroke="#085041" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-name">Etichette Bancale</span>
      </div>
      <div class="logo-sub">Stampa &amp; Allestimento Industriale</div>
    </div>

    <div class="sidebar-body">
      <p class="section-label">Dati commessa</p>
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" placeholder="Es. Rossi Tipografia" />
      </div>
      <div class="field">
        <label>Commessa</label>
        <input type="text" id="commessa" placeholder="Es. COM-2024-087" />
      </div>
      <div class="row2">
        <div class="field">
          <label>Copie / pacco</label>
          <input type="number" id="copiePacco" placeholder="100" min="1" oninput="aggiornaStats()" />
        </div>
        <div class="field">
          <label>Pacchi / bancale</label>
          <input type="number" id="pacchiBancale" placeholder="10" min="1" oninput="aggiornaStats()" />
        </div>
      </div>
      <p class="section-label" style="margin-top:.25rem">Versioni</p>
      <div class="versioni-cols">
        <span></span><span>Versione</span><span>Tiratura</span><span></span>
      </div>
      <div class="versioni-list" id="versioniList"></div>
      <button class="btn-add" onclick="aggiungiVersione()">+ Aggiungi versione</button>
      <div class="stats" id="statsBar"></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-primary" onclick="genera()">Genera etichette</button>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <button class="btn-link" onclick="apriStorico()">Storico commesse →</button>
        <button class="btn-ghost" id="btnStampa" style="display:none" onclick="stampa()">Stampa / PDF</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-info" id="topbarInfo">Nessuna commessa caricata</div>
      <div class="topbar-actions">

  const id = vId++;

function rimuoviVersione(id) {
  versioni = versioni.filter(v => v.id !== id);

}

function renderVersioni() {
  const list = document.getElementById('versioniList');

function aggiornaStats() {
  const CP = parseInt(document.getElementById('copiePacco').value) || 0;
  const PB = parseInt(document.getElementById('pacchiBancale').value) || 0;
  const bar = document.getElementById('statsBar');
  const vv = versioni.filter(v => v.nome.trim() && parseInt(v.tiratura) > 0);
  if (!CP || !PB || !vv.length) { bar.style.display = 'none'; return; }
  let html = '', totBancali = 0, totTiratura = 0;
  vv.forEach((v, i) => {
    const T = parseInt(v.tiratura);
    const tp = Math.ceil(T / CP);
    const tb = Math.ceil(tp / PB);
    totBancali += tb; totTiratura += T;
    html += `<div>V${i+1} <strong>${esc(v.nome)}</strong>: ${fmt(T)} cop. → <strong>${tb} bancali</strong></div>`;
  });
  html += `<hr class="stats-divider">
    <div>Tiratura totale: <strong>${fmt(totTiratura)} copie</strong></div>
    <div>Bancali totali: <strong>${totBancali}</strong></div>`;
  bar.innerHTML = html;
  bar.style.display = 'block';
}

    // data formato DD/MM/YYYY
    const parts = x.data ? x.data.split('/') : [];

// ── STORICO ──
function getStorico() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
function saveStorico(arr) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e) {} }

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function apriStorico() {
  renderStorico();
  document.getElementById('storicoModal').classList.add('open');
}

function chiudiStorico() {
  document.getElementById('storicoModal').classList.remove('open');
}

function renderStorico() {
  const arr = getStorico();
  const q = (document.getElementById('storicoSearch').value || '').toLowerCase().trim();
  const list = document.getElementById('storicoList');

  const filtrati = q ? arr.filter(x =>
    x.cliente.toLowerCase().includes(q) || x.commessa.toLowerCase().includes(q)
  ) : arr;

  if (!filtrati.length) {
    list.innerHTML = '<div class="storico-empty">Nessuna commessa trovata</div>';
    return;
  }

  // Raggruppa per mese/anno usando il campo data DD/MM/YYYY o ts
  const gruppi = {};
  filtrati.forEach((x, idx) => {
    let key, label;
    if (x.data) {
      const parts = x.data.split('/');
      if (parts.length === 3) {
        const m = parseInt(parts[1]) - 1;
        const y = parts[2];
        key = y + '-' + String(m+1).padStart(2,'0');
        label = MESI[m] + ' ' + y;
      }
    }
    if (!key) { key = 'sconosciuto'; label = 'Data sconosciuta'; }
    if (!gruppi[key]) gruppi[key] = { label, items: [] };
    // Salviamo l'indice originale nell'array completo per poter caricare
    const origIdx = arr.indexOf(x);
    gruppi[key].items.push({ x, origIdx });
  });

  // Ordina gruppi dal più recente
  const chiavi = Object.keys(gruppi).sort((a,b) => b.localeCompare(a));

  list.innerHTML = chiavi.map((key, gi) => {
    const g = gruppi[key];
    const rows = g.items.map(({ x, origIdx }) => {
      const totT = x.versioni.reduce((a,v) => a + v.tiratura, 0);
      const versioniStr = x.versioni.map((v,j) => `V${j+1} ${esc(v.nome)}: ${fmt(v.tiratura)}`).join(' · ');
      return `<div class="storico-row">
        <div class="storico-row-info">
          <div class="storico-row-title">${esc(x.cliente)} — ${esc(x.commessa)}</div>
          <div class="storico-row-meta">${x.data} &nbsp;·&nbsp; Tir. ${fmt(totT)} &nbsp;·&nbsp; ${x.copiePacco} cop/pacco &nbsp;·&nbsp; ${x.pacchiBancale} pacchi/bancale</div>
          <div class="storico-row-meta">${versioniStr}</div>
        </div>
        <button class="storico-row-action" onclick="caricaStorico(${origIdx})">↩ Carica</button>
      </div>`;
    }).join('');

    // Primo gruppo aperto di default
    const aperto = gi === 0 ? 'open' : '';
    return `<div class="storico-month-group">
      <div class="storico-month-head" onclick="toggleGruppo(this)">
        <span class="storico-month-name">${g.label}</span>
        <span class="storico-month-count">${g.items.length} commess${g.items.length===1?'a':'e'}</span>
        <span class="storico-month-arrow ${aperto}">▶</span>
      </div>
      <div class="storico-month-rows ${aperto}">${rows}</div>
    </div>`;
  }).join('');
}

function toggleGruppo(head) {
  const rows = head.nextElementSibling;
  const arrow = head.querySelector('.storico-month-arrow');
  rows.classList.toggle('open');
  arrow.classList.toggle('open');
}

function caricaStorico(i) {
  const x = getStorico()[i];
  if (!x) return;
  document.getElementById('cliente').value = x.cliente;
  document.getElementById('commessa').value = x.commessa;
  document.getElementById('copiePacco').value = x.copiePacco;
  document.getElementById('pacchiBancale').value = x.pacchiBancale;
  versioni = []; vId = 0;
  x.versioni.forEach(v => aggiungiVersione(v.nome, v.tiratura));
  aggiornaStats();
  chiudiStorico();
}

// ── STAMPA ──
function stampa() {
  const cards = Array.from(document.querySelectorAll('.label-card'));
  const clones = [];
  function makeQR(container, text) {
    container.innerHTML = '';
    QrCreator.render({ text, radius: 0, ecLevel: 'M', fill: '#000000', background: '#ffffff', size: 80 }, container);
  }
  cards.forEach(card => {
    const clone = card.cloneNode(true);
    const origCells = card.querySelectorAll('[id^="qr-"]');
    const cloneCells = clone.querySelectorAll('[id^="qr-"]');
    cloneCells.forEach((el, idx) => {
      el.removeAttribute('id');
      const txt = origCells[idx] ? origCells[idx]._qrText : null;
      if (txt) makeQR(el, txt);
    });
    card.parentNode.insertBefore(clone, card.nextSibling);
    clones.push(clone);
  });
  document.querySelectorAll('[id^="qr-"]').forEach(el => {
    if (el._qrText) makeQR(el, el._qrText);
  });
  setTimeout(() => {
    window.print();
    clones.forEach(c => c.parentNode && c.parentNode.removeChild(c));
  }, 300);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n) { return Number(n).toLocaleString('it-IT'); }
