<!DOCTYPE html>
<html lang="it">
<head>
<script>
// ANTI-FLASH-AUTH-GUARD: redirect prima di disegnare UI se sessione assente/scaduta.
// Evita il ''flash of unauthenticated content'' per chi apre la pagina senza login.
(function(){
  try{
    var raw=localStorage.getItem('ep_sess3_progr_stampa');
    if(!raw){document.documentElement.style.display="none";window.location.replace("https://marcolitosud.github.io/portale/");return;}
    var s=JSON.parse(raw);
    if(!s||!s.ts||(Date.now()-s.ts)>=90*24*60*60*1000){document.documentElement.style.display="none";window.location.replace("https://marcolitosud.github.io/portale/");return;}
  }catch(e){document.documentElement.style.display="none";window.location.replace("https://marcolitosud.github.io/portale/");}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Programmazione stampa · Effe Printing</title>

<script>
/* ═══ GUARD SESSIONE ═══ */
(function(){
  try{
    var raw = localStorage.getItem('ep_sess3_progr_stampa');
    if(!raw){ window.location.replace('https://marcolitosud.github.io/portale/'); return; }
    var sess = JSON.parse(raw);
    if(!sess || !sess.ts || Date.now() - sess.ts >= 90*24*60*60*1000){
      window.location.replace('https://marcolitosud.github.io/portale/');
    }
  }catch(e){ window.location.replace('https://marcolitosud.github.io/portale/'); }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">

<style>
body{background:#FAFAF5;color:#0E1117;font-family:'DM Sans',sans-serif}

.topbar{background:#0E1C36;color:#FAFAF5;display:flex;align-items:center;padding:10px 18px;gap:14px;position:sticky;top:0;z-index:30}
.tb-brand{background:#1E3A5F;color:#FAFAF5;font-weight:500;font-size:11px;padding:4px 8px;border-radius:4px;letter-spacing:.5px}
.tb-title{font-size:15px;font-weight:500;flex:1;display:flex;align-items:center;gap:8px}
.tb-title .sdot{background:#10B981}
.tb-clock{font-family:'DM Mono',monospace;font-size:13px;opacity:.8}
.tb-back{background:transparent;border:0.5px solid rgba(250,250,245,.25);color:#FAFAF5;font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;text-decoration:none}
.tb-back:hover{background:rgba(255,255,255,.08)}

.hero{background:#1E3A5F;color:#FAFAF5;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.hero-l{flex-shrink:0}
.hero-wk{font-size:14px;font-weight:500;line-height:1.2}
.hero-rg{font-size:11px;opacity:.75;margin-top:1px}
.hero-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hero-nav button{background:rgba(255,255,255,.1);border:0.5px solid rgba(255,255,255,.15);color:#FAFAF5;width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;padding:0;font-family:inherit}
.hero-nav button:hover{background:rgba(255,255,255,.18)}
.hero-nav button.wide{width:auto;padding:0 10px;font-size:11px;height:28px}

.daypills{display:flex;gap:2px;flex:1;min-width:280px;justify-content:center}
.dp{text-align:center;padding:4px 8px;border-radius:4px;cursor:pointer;transition:background .15s;min-width:58px;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.08)}
.dp:hover{background:rgba(255,255,255,.12)}
.dp.act{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.35)}
.dp.inact{opacity:.5}
.dp-l{font-size:10px;color:#FAFAF5;font-weight:500;letter-spacing:.3px}
.dp-n{font-size:9px;color:rgba(250,250,245,.65);margin-top:1px}
.dp.act .dp-l,.dp.act .dp-n{color:#FFFFFF}

.sect{background:#FFFFFF;padding:10px 18px;border-bottom:0.5px solid #E0DED6}
.sh{font-size:10px;color:#5F6570;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.sh-r{font-family:'DM Mono',monospace;text-transform:none;letter-spacing:0;color:#8A8B85;font-size:10px}

.basket{transition:background .15s;position:sticky;top:var(--basket-top,40px);z-index:20}
.basket.ov{background:#E6F0FB}
.bkr{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;min-height:64px}
.bkr::-webkit-scrollbar{height:4px}
.bkr::-webkit-scrollbar-thumb{background:#D4D3CC;border-radius:2px}
.bkr:empty::after{content:'Nessuna segnatura da pianificare';color:#8A8B85;font-size:11px;font-style:italic;padding:20px;width:100%;text-align:center;text-transform:none;letter-spacing:0}
.bkc{flex:0 0 auto;width:160px;background:#FFFFFF;border:0.5px solid #E0DED6;border-left-width:3px;border-radius:5px;padding:7px 9px;cursor:grab}
.bkc:hover{border-color:#1E3A5F}
.bkc.dg{opacity:.3}
.bkc.ripresa{background:#FFFCF5}
.bkc .tt{font-size:12px;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bkc .tag{display:inline-block;font-size:9px;padding:0 4px;background:#FEF3C7;color:#92400E;border-radius:2px;margin-right:3px;font-weight:500;vertical-align:1px}
.bkc .mm{font-size:10px;color:#5F6570;line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bkc .dd{font-size:10px;margin-top:4px;padding-top:4px;border-top:0.5px solid #E0DED6;display:flex;justify-content:space-between}
.bkc .dd b{font-weight:500}

.timeline{background:#FFFFFF;border-bottom:0.5px solid #E0DED6}
.tl-h{padding:10px 18px 6px;font-size:13px;color:#5F6570;display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap}
.tl-hint{font-size:10px;color:#8A8B85;font-family:'DM Mono',monospace}
.tl-wrap{padding:8px 18px 12px}
.tl-hd{display:flex;gap:4px;padding:0 2px;border-bottom:0.5px solid #E0DED6;background:#FFFFFF;position:sticky;top:var(--tlhd-top,140px);z-index:10}
.tl-hd>div{padding:6px 4px;font-size:11px;color:#5F6570;text-align:center;flex-shrink:0}
.tl-hd>div.mn{font-weight:500;color:#0E1117}
.tl-hd .hd-h{width:32px;padding:0}
.tl-hd .hd-s{width:22px;padding:0}
.tl-hd .hd-af,.tl-hd .hd-inc{width:78px}
.tl-hd .hd-kba{flex:1;min-width:0}
.tl-body{display:flex;gap:4px;padding:0 2px;position:relative}
.col{flex-shrink:0;position:relative}
.col.hours{width:32px;background:#FFFFFF}
.col.hours .lbl{position:absolute;right:4px;font-size:10px;color:#5F6570;font-family:'DM Mono',monospace;line-height:1;padding-top:3px;font-weight:500}
.col.shifts{width:22px}
.col.shifts .sh-band{position:absolute;left:0;right:0;display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:9px;font-weight:500;letter-spacing:.5px}
.col.shifts .sh-III{background:#EDE9FE;color:#6B21A8}
.col.shifts .sh-I{background:#DBEAFE;color:#1E40AF}
.col.shifts .sh-II{background:#FEF3C7;color:#92400E}
.col.tk{min-width:0;background-color:#F5F3ED;background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 21.5px,rgba(14,28,54,.08) 21.5px,rgba(14,28,54,.08) 22px);border-radius:4px}
.col.tk.af,.col.tk.inc{width:78px;flex-shrink:0}
.col.tk.mn{background-color:#F0EFE8;flex:1}
.col.tk.ov{background-color:#E6F0FB;outline:1.5px solid #1E3A5F}
.col .shift-b{position:absolute;left:0;right:0;height:1px;background:rgba(14,28,54,.2);pointer-events:none;z-index:1}
.daysep{position:absolute;left:0;right:0;height:2px;background:#0E1C36;pointer-events:none;z-index:2}
.daychip{position:absolute;left:2px;top:0;background:#0E1C36;color:#FAFAF5;font-size:10px;font-weight:500;padding:2px 8px;border-radius:0 0 4px 0;z-index:4;letter-spacing:.5px;pointer-events:none;text-transform:uppercase}

.fase{position:absolute;left:3px;right:3px;cursor:grab;user-select:none;overflow:hidden;border:0.5px solid;border-radius:4px;box-sizing:border-box;z-index:3}
.fase.small{padding:2px 5px;font-size:9px;display:flex;align-items:center;white-space:nowrap;line-height:1.1}
.fase.big{padding:6px 10px;display:flex;flex-direction:column;font-size:11px;border-radius:5px}
.fase.dg{opacity:.3}
.fase.warn{border:1.5px solid #EF4444;outline:1px solid rgba(239,68,68,.3)}
.fase .tt{font-size:11px;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fase .mm{font-size:9px;opacity:.85;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.fase.big .tt{font-size:13px;font-weight:500;line-height:1.25;margin-bottom:2px}
.fase.big .mm{font-size:11px;line-height:1.3;margin-top:1px;opacity:.9}
/* Box molto corti: titolo+info su unica riga, troncati */
.fase.big .row-inline{display:flex;align-items:baseline;gap:6px;overflow:hidden;white-space:nowrap}
.fase.big .row-inline .tt{font-size:12px;margin:0;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.fase.big .row-inline .mm{font-size:11px;margin:0;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.fase.big .tt.inline{font-size:12px;margin:0;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Slot di un turno chiuso: overlay tratteggiato sulle tracce KBA/af/inc */
.slot-closed{position:absolute;left:0;right:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(-45deg,
    rgba(107,33,168,.08) 0, rgba(107,33,168,.08) 5px,
    rgba(107,33,168,.18) 5px, rgba(107,33,168,.18) 10px)}
/* Fascia turno chiuso sulla colonna shifts */
.col.shifts .sh-band.closed{opacity:.4;background-image:repeating-linear-gradient(-45deg,
  rgba(0,0,0,.05) 0, rgba(0,0,0,.05) 4px,
  rgba(0,0,0,.12) 4px, rgba(0,0,0,.12) 8px)}
.col.shifts .sh-band{cursor:context-menu}
.pb{height:3px;border-radius:2px;margin-top:3px;overflow:hidden}
.ripresa-ico{position:absolute;top:3px;right:4px;font-size:9px;font-weight:500;background:rgba(255,255,255,.7);padding:0 4px;border-radius:2px;z-index:4}
.now{position:absolute;left:0;right:0;height:1px;background:#EF4444;pointer-events:none;z-index:6}
.nowl{position:absolute;left:2px;background:#EF4444;color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;white-space:nowrap;z-index:7;pointer-events:none;font-family:'DM Mono',monospace;transform:translateY(-50%)}

.cm{position:absolute;background:#FFFFFF;border:0.5px solid #0E1C36;border-radius:6px;padding:4px;z-index:50;min-width:200px}
.cm .hd{padding:4px 10px;font-size:10px;color:#8A8B85;letter-spacing:.5px;text-transform:uppercase;border-bottom:0.5px solid #E0DED6;margin-bottom:2px}
.cm button{background:transparent;border:none;padding:7px 10px;width:100%;text-align:left;font-size:12px;color:#0E1117;border-radius:4px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.cm button:hover{background:#F5F3ED}
.cm .cm-sub{padding:8px 10px 4px;font-size:10px;color:#8A8B85;letter-spacing:.5px;text-transform:uppercase;border-top:0.5px solid #E0DED6;margin-top:4px}
.cm .cm-swatches{display:flex;gap:6px;padding:4px 10px 8px;flex-wrap:wrap}
.cm-swatch{width:24px;height:24px;border-radius:50%;border:1.5px solid;cursor:pointer;transition:transform .12s;flex-shrink:0}
.cm-swatch:hover{transform:scale(1.18)}
.cm-swatch.act{box-shadow:0 0 0 2px #0E1C36;transform:scale(1.1)}

/* Modal di taglio (split) */
.mdbg{position:fixed;inset:0;background:rgba(14,28,54,.35);z-index:80;display:none;align-items:center;justify-content:center}
.mdbg.on{display:flex}
.md{background:#FFFFFF;border-radius:8px;padding:18px 20px;width:340px;max-width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(14,28,54,.25);font-family:'DM Sans',sans-serif}
.md h3{font-size:14px;font-weight:500;margin:0 0 4px;color:#0E1117}
.md .sub{font-size:11px;color:#5F6570;margin-bottom:14px}
.md .row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#5F6570;margin-bottom:6px}
.md .row b{color:#0E1117;font-weight:500;font-family:'DM Mono',monospace}
.md label{display:block;font-size:11px;color:#5F6570;margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase;margin-top:8px}
.md input{width:100%;border:0.5px solid #E0DED6;border-radius:5px;padding:8px 10px;font-size:14px;font-family:'DM Mono',monospace;color:#0E1117;background:#FAFAF5;box-sizing:border-box}
.md input:focus{outline:none;border-color:#1E3A5F;background:#FFFFFF}
.md .pv{margin-top:10px;padding:10px 12px;background:#F5F3ED;border-radius:5px;font-size:12px;color:#0E1117;line-height:1.5}
.md .pv .pvr{display:flex;justify-content:space-between}
.md .pv b{font-family:'DM Mono',monospace;font-weight:500}
.md .err{color:#EF4444;font-size:11px;margin-top:6px;min-height:14px}
.md .btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.md .btns button{font-family:inherit;font-size:12px;padding:7px 14px;border-radius:5px;cursor:pointer;border:0.5px solid}
.md .btns .cancel{background:#FFFFFF;color:#5F6570;border-color:#E0DED6}
.md .btns .cancel:hover{background:#F5F3ED}
.md .btns .ok{background:#0E1C36;color:#FAFAF5;border-color:#0E1C36}
.md .btns .ok:hover{background:#1E3A5F}
.md .btns .ok:disabled{opacity:.4;cursor:not-allowed}

.live{background:#FAFAF5;padding:14px 18px 20px}
.lv-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.lv-t{font-size:13px;font-weight:500}
.lv-u{font-size:11px;color:#8A8B85;font-family:'DM Mono',monospace}
.lv-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lvc{background:#FFFFFF;border:0.5px solid #E0DED6;border-radius:6px;padding:12px 14px}
.lvc.idle{opacity:.6}
.lvch{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.lvcl{font-size:11px;color:#5F6570}
.lvcs{font-size:10px;font-weight:500}
.lvcs.on{color:#10B981}
.lvcs.off{color:#8A8B85}
.lvcs.fermo{color:#EF4444}
.lvcn{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.2}
.lvcm{font-size:11px;color:#5F6570;margin-bottom:8px}
.lvcp{height:4px;border-radius:2px;overflow:hidden}
.lvcf{display:flex;justify-content:space-between;font-size:10px;color:#8A8B85;margin-top:6px}

@media (max-width:640px){
  .lv-g{grid-template-columns:1fr}
  /* Topbar e hero più compatte */
  .topbar{padding:8px 12px;gap:8px}
  .tb-title{font-size:13px}
  .tb-clock{font-size:11px}
  .tb-back{font-size:11px;padding:3px 8px}
  .hero{padding:8px 12px;gap:8px}
  .hero-wk{font-size:13px}
  .hero-rg{font-size:10px}
  /* Day pills più piccoli per stare in larghezza */
  .daypills{min-width:0;gap:1px}
  .dp{min-width:42px;padding:3px 4px}
  .dp-l{font-size:9px}
  .dp-n{font-size:8px}
  /* Sezioni più strette */
  .sect{padding:8px 12px}
  .sh{font-size:9px}
  .sh-r{font-size:9px}
  /* Basket card un filo più strette */
  .bkc{width:140px;padding:6px 8px}
  .bkc .tt{font-size:11px}
  .bkc .mm{font-size:10px}
  .bkc .dd{font-size:9px}
  /* Timeline: colonne af/inc più strette per dare spazio alle KBA */
  .tl-wrap{padding:6px 12px 10px}
  .col.tk.af,.col.tk.inc{width:54px}
  .tl-hd .hd-af,.tl-hd .hd-inc{width:54px}
  .tl-hd>div{font-size:10px}
  /* Blocchi KBA: testo va a capo invece di troncare */
  .fase.big{padding:4px 6px}
  .fase.big .tt{font-size:11px;white-space:normal;line-height:1.2;word-break:break-word}
  .fase.big .mm{font-size:10px;white-space:normal;line-height:1.2;word-break:break-word}
  /* Blocchi piccoli (af, inc) restano sulla stessa riga ma più stretti */
  .fase.small{font-size:8px;padding:1px 3px}
  .fase .tt{font-size:10px}
  .fase .mm{font-size:8px}
  /* Numeri ora più compatti */
  .col.hours{width:26px}
  .col.hours .lbl{font-size:9px;right:3px}
  .col.shifts{width:18px}
  .tl-hd .hd-h{width:26px}
  .tl-hd .hd-s{width:18px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">EP</div>
  <div class="tb-title">Programmazione stampa<span class="sdot"></span></div>
  <div class="tb-clock" id="tb-clock">--:--:--</div>
  <a class="tb-back" href="https://marcolitosud.github.io/portale/">← Portale</a>
</div>

<div class="hero">
  <div class="hero-l">
    <div class="hero-wk" id="hero-wk">Settimana —</div>
    <div class="hero-rg" id="hero-rg">—</div>
  </div>
  <div class="daypills" id="daypills"></div>
  <div class="hero-nav">
    <button id="btn-prev" title="Settimana precedente">‹</button>
    <button id="btn-today" class="wide">Oggi</button>
    <button id="btn-next" title="Settimana successiva">›</button>
  </div>
</div>

<div class="sect basket" id="basket">
  <div class="sh">
    <span>Basket segnature · trascina sulle colonne KBA</span>
    <span class="sh-r">V7 ≥48p 22k · &lt;48p 40k · P5 ≥48p 25k · &lt;48p 35k · avvio 1h30'</span>
  </div>
  <div class="bkr" id="blist"></div>
</div>

<div class="timeline">
  <div class="tl-wrap">
    <div class="tl-hd">
      <div class="hd-h"></div>
      <div class="hd-s"></div>
      <div class="hd-af">Arr. file</div>
      <div class="hd-inc">Incisione</div>
      <div class="hd-kba mn">KBA 1</div>
      <div class="hd-kba mn">KBA 2</div>
    </div>
    <div class="tl-body" id="tlbody">
      <div class="col hours" id="hcol"></div>
      <div class="col shifts" id="scol"></div>
      <div class="col tk af" data-tipo="af"></div>
      <div class="col tk inc" data-tipo="inc"></div>
      <div class="col tk mn" data-lane="1"></div>
      <div class="col tk mn" data-lane="2"></div>
      <div class="now" id="nl"></div>
      <div class="nowl" id="nll"></div>
    </div>
  </div>
</div>

<div class="live">
  <div class="lv-h">
    <span class="lv-t">In produzione ora</span>
    <span class="lv-u" id="lv-u">—</span>
  </div>
  <div class="lv-g" id="live-grid"></div>
</div>

<div class="loader" id="loader"></div>
<div class="toast" id="toast"></div>

<!-- Modal di taglio (split) -->
<div class="mdbg" id="splitBg">
  <div class="md" id="splitMd">
    <h3 id="splitTitle">Dividi produzione</h3>
    <div class="sub" id="splitSub">—</div>
    <div class="row">Copie totali <b id="splitTot">—</b></div>
    <label for="splitInput">Copie già completate</label>
    <input type="text" inputmode="numeric" id="splitInput" placeholder="es. 12000" autocomplete="off">
    <div class="pv">
      <div class="pvr"><span>Rimaste</span><b id="splitRem">—</b></div>
      <div class="pvr"><span>Durata ripresa</span><b id="splitDur">—</b></div>
    </div>
    <div class="err" id="splitErr"></div>
    <div class="btns">
      <button class="cancel" id="splitCancel">Annulla</button>
      <button class="ok" id="splitOk" disabled>Dividi</button>
    </div>
  </div>
</div>

<script src="sb.js"></script>
<script>
(function(){
'use strict';

// ═══ Config & palette ══════════════════════════════════════════════
const PALETTE = {
  pink:    {bg:'#FBEAF0',fg:'#4B1528',bd:'#D4537E',fill:'#993556',base:'#F4C0D1'},
  magenta: {bg:'#FAE2EC',fg:'#4D0F2E',bd:'#C73178',fill:'#90154E',base:'#EFA8C7'},
  blue:    {bg:'#E6F1FB',fg:'#042C53',bd:'#378ADD',fill:'#185FA5',base:'#B5D4F4'},
  indigo:  {bg:'#E8E6FA',fg:'#1A1547',bd:'#5447CC',fill:'#352BA0',base:'#BFB7E8'},

// ═══ Tempo & formati ══════════════════════════════════════════════
function getMonday(d){
  const x = new Date(d || Date.now());
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - (x.getDay() || 7) + 1);
  return x;
}
// YYYY-MM-DD dalla data locale (niente toISOString: l'UTC sfasa il giorno)
function toYMD(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function hFromISO(iso){
  return iso ? (new Date(iso).getTime() - S.weekStart.getTime()) / 3600000 : null;
}
function isoFromH(h){
  return h == null ? null : new Date(S.weekStart.getTime() + h*3600000).toISOString();
}
function nowH(){ return (Date.now() - S.weekStart.getTime()) / 3600000; }
function fmtH(h){
  const H = Math.floor(h), M = Math.round((h-H)*60);
  return H <= 0 ? M+"'" : H+'h '+String(M).padStart(2,'0')+"'";
}
function fmtDT(h){
  const d = Math.floor(h/24);
  const hh = Math.floor(h - d*24), mm = Math.round((h - d*24 - hh) * 60);
  return `${DAYS_SHORT[((d%7)+7)%7]} ${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function fmtDate(d){ return `${d.getDate()} ${MESI[d.getMonth()]} ${d.getFullYear()}`; }
function fmtClock(d){
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function isoWeek(d){
  const t = new Date(d);
  t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - (t.getDay()+6)%7);
  const w1 = new Date(t.getFullYear(),0,4);
  const week = 1 + Math.round(((t - w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
  return {week, year: t.getFullYear()};
}

function ctById(id){ return S.cartellini.find(x => x.id == id); }

}
function nomeOf(ct){
  if(!ct) return '?';
  return (ct.commessa || '?') + (ct.numCommessa ? ' '+ct.numCommessa : '');
}
function cartaOf(ct){ return (ct && ct.tipopiega) || 'V7'; }
function copieOf(ct, p){
  if(p && p.split_copie) return p.split_copie;
  return (ct && ct.tiraturaRich) || 0;
}
function cph(carta, fmt){
  if(carta === 'V7') return fmt >= 48 ? 22000 : 40000;
  return fmt >= 48 ? 25000 : 35000;
}
function durKba(carta, fmt, copie){
  if(!copie || !fmt) return 1.5;
  return 1.5 + copie / cph(carta, fmt);
}
function colOf(ct){
  // Override esplicito impostato dall'utente (cambio colore via menu contestuale)
  if(ct && ct.colore && PALETTE[ct.colore]) return ct.colore;
  const c = ct && ct.commessa ? ct.commessa.toLowerCase() : '';
  for(const [k,v] of COLOR_MAP){
    if(typeof k === 'string'){
      if(c.includes(k)) return v;
    } else if(k instanceof RegExp){
      if(k.test(c)) return v;
    }
  }
  // hash fallback deterministico
  let h = 0;
  for(const ch of c) h = (h*31 + ch.charCodeAt(0)) >>> 0;
  return PALETTE_KEYS[h % PALETTE_KEYS.length];
}

function hdrs(extra){

  };
  if(extra) Object.keys(extra).forEach(k => h[k] = extra[k]);

// Helper: retry con backoff esponenziale per scritture Supabase.
// 3 tentativi (1s, 2s di pausa). Se fallisce del tutto, rilancia l'eccezione
// così la funzione chiamante può gestire (toast, reload, ecc).
async function _sbRetry(label, doFetch){
  var attempts=0, maxAttempts=3, lastErr=null;
  while(attempts<maxAttempts){
    attempts++;
    try{
      var r=await doFetch();
      if(!r.ok){
        var txt=await r.text().catch(()=>'');
        throw new Error('HTTP '+r.status+' '+txt);
      }
      if(attempts>1)console.log('['+label+'] riuscito al tentativo '+attempts);
      return r;
    }catch(e){
      lastErr=e;
      console.warn('['+label+'] tentativo '+attempts+'/'+maxAttempts+' fallito:',e.message||e);
      if(attempts<maxAttempts){
        await new Promise(function(res){setTimeout(res,attempts*1000);});
      }
    }
  }
  console.error('['+label+'] TUTTI I TENTATIVI FALLITI:',lastErr);
  throw lastErr;
}

// Wrapper fetch con timeout 15s: evita fetch che si "appendono" indefinitamente
function _fetchTimeout(url, opts, ms){
  ms = ms || 15000;
  var cc = new AbortController();
  var id = setTimeout(function(){cc.abort();}, ms);
  var o = Object.assign({}, opts||{}, {signal: cc.signal});
  return fetch(url, o).finally(function(){clearTimeout(id);});
}

async function sbGet(path){
  const r = await _fetchTimeout(SB.URL + '/rest/v1/' + path, {headers: hdrs()});
  if(!r.ok) throw new Error('GET '+path+' — HTTP '+r.status+' '+(await r.text()));
  return r.json();
}
async function sbInsert(table, row){
  const r = await _sbRetry('INSERT '+table, ()=>_fetchTimeout(SB.URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: hdrs({'Prefer':'return=representation'}),
    body: JSON.stringify([row])
  }));
  const rows = await r.json();
  return rows[0];
}
async function sbUpdate(table, idVal, patch){
  await _sbRetry('UPDATE '+table, ()=>_fetchTimeout(SB.URL + '/rest/v1/' + table + '?id=eq.' + idVal, {
    method: 'PATCH',
    headers: hdrs({'Prefer':'return=minimal'}),
    body: JSON.stringify(patch)
  }));
}
async function sbDelete(table, idVal){
  await _sbRetry('DELETE '+table, ()=>_fetchTimeout(SB.URL + '/rest/v1/' + table + '?id=eq.' + idVal, {
    method: 'DELETE',
    headers: hdrs()
  }));
}

async function refreshLive(){

  // Il refresh avverrà alla prossima ricomparsa della tab.
  if(document.hidden){
    console.log('[refreshLive] tab nascosta, salto polling');
    return;
  }
  try{
    _refreshTick++;

    const weekEndYMD   = toYMD(new Date(S.weekStart.getTime() + 7*86400000));
    // prod_reports è pesante (fino a 3000 righe) e cambia raramente: scaricalo solo 1 su N
    const shouldFetchReports = (_refreshTick % REFRESH_REPORTS_EVERY === 0);
    const queries = [
      sbGet('progr_cartellini?select=id,prod_stato,prod_giri_fatti,prod_operatore,kba_start'),
      sbGet('prod_active?select=*'),
      sbGet('progr_turni_chiusi?select=*&giorno=gte.' + weekStartYMD + '&giorno=lt.' + weekEndYMD)
    ];

      queries.push(sbGet('prod_reports?select=commessa_id,segn_id,fermi_sec&order=id.desc&limit=3000'));
    }
    const results = await Promise.all(queries);
    const [pians, acts, tch] = results;
    const rep = shouldFetchReports ? results[3] : null;
    // merge pianif prod_* e kba_start (può essere cambiato dalla cascade)
    const mp = {};
    (pians||[]).forEach(p => { mp[p.id] = p; });
    S.pianificazioni.forEach(p => {

    (acts||[]).forEach(r => { S.prodActive[r.id] = r.data; });
    S.turniChiusi = tch || [];
    if(rep !== null){
      S.prodReports = rep;
      console.log('[refreshLive] prod_reports ricaricato ('+rep.length+' righe) al tick '+_refreshTick);

// Lock globale per prevenire chiamate concorrenti sulla stessa operazione

async function createPianif(p){

  const _k = 'create-'+p.cartellino_id+'-'+p.segnatura_idx+'-'+(p.split_from_id||'0');

    });

  }catch(e){
    console.error('createPianif:', e, p);
    toast('Errore pianificazione: '+e.message, true);
    return null;
  }finally{_pianifLocks[_k]=false;}
}
async function updatePianif(p, patch){
  const _k = 'update-'+p.id;
  if(_pianifLocks[_k]){console.warn('[pianifLock:'+_k+'] BLOCCATO: update già in corso');return;}
  _pianifLocks[_k]=true;
  try{
    // Salva i valori ORIGINALI per rollback in caso di fallimento
    const _orig = {};
    Object.keys(patch).forEach(k => { _orig[k] = p[k]; });
    // Applica ottimisticamente in memoria
    Object.keys(patch).forEach(k => { p[k] = patch[k]; });
    try{
      await sbUpdate('progr_cartellini', p.id, patch);
    }catch(e){
      // Rollback dello stato in memoria in modo che UI ricarichi coerente
      Object.keys(_orig).forEach(k => { p[k] = _orig[k]; });
      console.error('updatePianif:', e, p, patch);
      toast('Errore salvataggio, ripristino stato precedente: '+e.message, true);
      await loadAll();
    }
  }finally{_pianifLocks[_k]=false;}
}
async function deletePianif(id){
  const _k = 'delete-'+id;
  if(_pianifLocks[_k]){console.warn('[pianifLock:'+_k+'] BLOCCATO: delete già in corso');return;}

// ═══ Turni chiusi ═════════════════════════════════════════════════
// Range di ore (assolute dal lunedì 00:00) del turno `t` nel giorno `d`
// - I:   dayBase+7  → dayBase+15
// - II:  dayBase+15 → dayBase+23
// - III: dayBase+23 → dayBase+31 (= 7:00 del giorno dopo)
function turnoRange(dayIdx, turno){
  const base = dayIdx * 24;
  if(turno === 'I')   return [base+7,  base+15];
  if(turno === 'II')  return [base+15, base+23];
  /* III */           return [base+23, base+31];
}
function giornoFromDate(iso){
  // iso è YYYY-MM-DD: parse come data LOCALE (niente Z), così
  // Date.getTime() è mezzanotte locale, coerente con S.weekStart
  const parts = String(iso).split('-').map(Number);
  const dt = new Date(parts[0], parts[1]-1, parts[2]);
  return Math.round((dt.getTime() - S.weekStart.getTime()) / 86400000);
}
function isTurnoChiuso(dayIdx, turno){
  return S.turniChiusi.some(x => giornoFromDate(x.giorno) === dayIdx && x.turno === turno);
}
function turniChiusiRanges(){
  // array di [start, end] in ore assolute della settimana corrente
  const out = [];
  S.turniChiusi.forEach(x => {
    const d = giornoFromDate(x.giorno);
    if(d < -1 || d >= DAY_COUNT) return;
    out.push(turnoRange(d, x.turno));
  });
  return out;
}
// Se l'ora h cade dentro un turno chiuso, ritorna la fine del turno (fuori dalla chiusura).
// Usato nei drop per evitare che l'utente piazzi stampa dentro turno chiuso.
function shiftIfInClosed(h){
  for(const [s,e] of turniChiusiRanges()){
    if(h >= s && h < e) return e;
  }
  return h;
}

// ═══ Fermi macchina (da prod_reports storici + prod_active in corso) ══
function fermiOreDi(p){
  let sec = 0;
  // 1) fermi storici chiusi, dai report
  S.prodReports.forEach(r => {
    if(r.commessa_id == p.cartellino_id &&
       r.segn_id != null && (r.segn_id - 1) === p.segnatura_idx &&
       r.fermi_sec){
      sec += r.fermi_sec;
    }
  });
  // 2) fermi della sessione attiva sulla KBA corrispondente
  if(p.kba_lane){
    const act = S.prodActive['kba' + p.kba_lane];
    if(act && act.commessaId == p.cartellino_id && act.segnId == p.segnatura_idx + 1){
      sec += (act.fermiSec || act.fermi_sec || 0);
      // Se fermo ora, aggiungo il tempo corrente
      if(act.stato === 'fermo' && act.oraFermoInizio){
        sec += (Date.now() - act.oraFermoInizio) / 1000;
      }
    }
  }
  return Math.max(0, sec / 3600);
}

// ═══ Stima dinamica fine produzione ═══════════════════════════════
// Calcola la fine stimata di un blocco KBA in produzione basandosi sulla
// velocità reale (giri fatti / ore trascorse). Restituisce null se il blocco
// non è in produzione o se non ci sono ancora dati affidabili (< 15 minuti).
// Restituisce anche il delta vs il blocco successivo sulla stessa lane.
const STIMA_MIN_MINUTI = 15;     // dati troppo pochi sotto questa soglia
const STIMA_OVERLAP_RED = 1.0;   // ore: oltre questo sforamento → rosso

function stimaFineLive(p){
  if(!p || !p.kba_start || !p.kba_lane) return null;
  if(p.prod_stato === 'completato' || p.prod_stato === 'annullato') return null;
  const ct = ctById(p.cartellino_id);
  if(!ct) return null;
  const seg = (ct.segnature||[])[p.segnatura_idx];
  if(!seg) return null;

  // Giri reali fatti finora (priorità a prod_active "live", poi al campo persistito)
  let giri = 0;
  const act = S.prodActive['kba'+p.kba_lane];
  if(act && act.commessaId == p.cartellino_id && act.segnId == p.segnatura_idx+1){
    giri = act.avanz || 0;
  } else if(p.prod_giri_fatti){
    giri = p.prod_giri_fatti;
  }
  if(giri <= 0) return null; // non ancora iniziato a contare

  const copie = p.split_copie || ct.tiraturaRich || 0;
  if(!copie || giri >= copie) return null;

  // Ore trascorse da kba_start (al netto dei fermi che non sono produzione)
  const start = hFromISO(p.kba_start);
  const now = nowH();
  const trascorseLorde = now - start;
  if(trascorseLorde <= 0) return null;
  const fermi = fermiOreDi(p);
  // Tempo "produttivo" = totale dall'inizio meno avvio macchina (1.5h) e fermi
  // Sotto 15 minuti di tempo produttivo i giri/h sono inaffidabili
  const produttiveLorde = trascorseLorde - 1.5 - fermi;
  if(produttiveLorde * 60 < STIMA_MIN_MINUTI) return null;

  const cphReale = giri / produttiveLorde; // copie/ora reale
  if(cphReale <= 0) return null;

  const rimaste = copie - giri;
  const oreResidue = rimaste / cphReale;

  // Proietto la fine partendo da "now" e consumando oreResidue di tempo
  // PRODUTTIVO. Quando il cursore entra in un turno chiuso, lo salto in avanti
  // alla fine del turno (la macchina è ferma, le copie non scendono).
  // Algoritmo lineare: ordino i turni chiusi futuri e li attraverso uno a uno.
  const ranges = turniChiusiRanges()
    .filter(([,e]) => e > now)              // solo chiusure non ancora finite
    .sort((a,b) => a[0] - b[0]);
  let cursor = now;
  let restante = oreResidue;
  for(const [s, e] of ranges){
    if(cursor >= e) continue;               // chiusura già passata
    if(s >= cursor + restante) break;       // finiamo prima di questa chiusura
    // Consumo le ore produttive fino all'inizio della chiusura
    const finoAllaChiusura = Math.max(0, s - cursor);
    restante -= finoAllaChiusura;
    cursor = e;                             // salto alla fine della chiusura
  }
  const fineStim = cursor + restante;

  // Confronto con il prossimo blocco sulla stessa lane
  const successivo = S.pianificazioni
    .filter(x => x.id !== p.id &&
                 x.kba_lane === p.kba_lane &&
                 x.kba_start &&
                 hFromISO(x.kba_start) > start &&
                 x.prod_stato !== 'completato' &&
                 x.prod_stato !== 'annullato')
    .sort((a,b) => hFromISO(a.kba_start) - hFromISO(b.kba_start))[0];

  const startSucc = successivo ? hFromISO(successivo.kba_start) : null;
  const overlap = startSucc !== null ? Math.max(0, fineStim - startSucc) : 0;

  return {
    cphReale,
    fineStim,                        // ora assoluta in "ore dal lunedì"
    overlap,                         // ore di sforamento (0 se ok)
    sforaCritico: overlap > STIMA_OVERLAP_RED,
    successivoId: successivo ? successivo.id : null
  };
}
// Scorre ogni KBA lane in ordine temporale: se una pianificazione
// (estesa dai suoi fermi) sfora sulla successiva, sposta la successiva
// in avanti. Salva in DB solo se il nuovo start differisce di almeno 1 minuto.
async function applyCascadeFermi(){
  var failures=[];
  for(const lane of [1, 2]){
    const lista = S.pianificazioni
      .filter(p => p.kba_lane === lane && p.kba_start &&
                   p.prod_stato !== 'completato' && p.prod_stato !== 'annullato')
      .sort((a, b) => hFromISO(a.kba_start) - hFromISO(b.kba_start));
    let prevEnd = null;
    for(const p of lista){
      const ct = ctById(p.cartellino_id);
      if(!ct) continue;
      const seg = (ct.segnature || [])[p.segnatura_idx];
      if(!seg) continue;
      const copie = p.split_copie || ct.tiraturaRich || 0;
      const durTot = durKba(cartaOf(ct), seg.fol, copie) + fermiOreDi(p);
      let start = hFromISO(p.kba_start);
      // 1) non può iniziare prima della fine del precedente
      if(prevEnd !== null && start < prevEnd) start = prevEnd;
      // 2) non può iniziare dentro un turno chiuso
      start = shiftIfInClosed(start);
      // se cambiato di ≥1 minuto, salva in DB
      const origStart = hFromISO(p.kba_start);
      const deltaMin = (start - origStart) * 60;
      if(deltaMin >= 1){
        const newISO = isoFromH(start);
        try{
          await sbUpdate('progr_cartellini', p.id, {kba_start: newISO});
          p.kba_start = newISO;
        }catch(e){
          // NON blocca il resto della cascade: alcune pianificazioni possono
          // essere spostate correttamente anche se una fallisce. La pianificazione
          // che fallisce rimane al kba_start precedente (UI e DB coerenti).
          console.warn('[cascade] update fallita su pianif id='+p.id+':',e.message);
          failures.push({id:p.id, lane:lane, error:e.message});
          // importante: NON aggiornare p.kba_start in memoria, così UI riflette
          // quello che realmente c'è nel DB
        }
      }
      prevEnd = start + durTot;
    }
  }
  if(failures.length){
    console.warn('[cascade] '+failures.length+' update fallite:',failures);
    // Toast discreto solo se ce ne sono molte, altrimenti l'utente non si spaventa
    // per un singolo glitch di rete
    if(failures.length>=2){
      toast('⚠️ '+failures.length+' pianificazioni non aggiornate per problemi di rete. Riprovo al prossimo refresh.',true);
    }
  }
}


function buildBasket(){
  const out = [];
  // Set delle segnature già stampate (da prod_reports del modulo Produzione).
  // segn_id in prod_reports è 1-based → lo riporto a 0-based per match con segnatura_idx
  const stampate = new Set();
  S.prodReports.forEach(r => {
    if(r.commessa_id != null && r.segn_id != null){
      stampate.add(r.commessa_id + '|' + (r.segn_id - 1));
    }
  });
  // 1) segnature di cartellini non ancora stampate e senza pianificazione
  S.cartellini.forEach(ct => {
    (ct.segnature || []).forEach((seg, idx) => {
      if(!seg || !seg.fol) return;
      // Già stampata → fuori
      if(stampate.has(ct.id + '|' + idx)) return;
      const pians = pianFor(ct.id, idx).filter(p => !p.split_from_id);
      // Pianificazione con stato completato/annullato o con fasi piazzate → fuori
      const gestita = pians.some(p =>
        p.prod_stato === 'completato' ||
        p.prod_stato === 'annullato' ||
        p.af_start || p.inc_start || p.kba_start
      );
      if(!gestita) out.push({type:'segnatura', ct, seg, idx});
    });
  });
  // 2) riprese non piazzate
  S.pianificazioni.forEach(p => {
    if(!p.split_from_id) return;
    if(p.af_start || p.inc_start || p.kba_start) return;
    if(p.prod_stato === 'completato' || p.prod_stato === 'annullato') return;
    const ct = ctById(p.cartellino_id);
    if(!ct) return;
    const seg = (ct.segnature||[])[p.segnatura_idx];
    if(!seg) return;
    out.push({type:'ripresa', ct, seg, idx:p.segnatura_idx, pianif:p});
  });
  return out;
}

function annotaWarnings(p){
  p._wAf = false; p._wInc = false; p._wKba = false;
  const af = hFromISO(p.af_start), inc = hFromISO(p.inc_start), kba = hFromISO(p.kba_start);
  if(af!=null && inc!=null && af + DUR_AF > inc){ p._wAf = true; p._wInc = true; }
  if(inc!=null && kba!=null && inc + DUR_INC > kba){ p._wInc = true; p._wKba = true; }
}

    const seg = (ct.segnature||[])[p.segnatura_idx];
    if(!seg) return;
    annotaWarnings(p);
    const carta = cartaOf(ct), fmt = seg.fol;
    const copie = p.split_copie || ct.tiraturaRich || 0;
    const pal = PALETTE[colOf(ct)];
    const nome = nomeOf(ct);

      if(h > -DUR_AF && h < DAY_COUNT*24) addFase(p, 'af', h, DUR_AF, nome, pal, p._wAf, false);
    }
    if(p.inc_start){
      const h = hFromISO(p.inc_start);

    }
    if(p.kba_start && p.kba_lane){
      const h = hFromISO(p.kba_start);
      const d = durKba(carta, fmt, copie);
      if(h > -d && h < DAY_COUNT*24) addFaseBig(p, h, d, nome, pal, p._wKba, now, ct, seg, carta, fmt, copie);

function addFaseBig(p, start, durTeor, nome, pal, warn, now, ct, seg, carta, fmt, copie){
  const tk = document.querySelector('.col.tk[data-lane="'+p.kba_lane+'"]');
  if(!tk) return;
  const fermiOre = fermiOreDi(p);
  const durTot = durTeor + fermiOre;
  const heightPx = durTot * PX_H;
  // Stima dinamica fine: se il blocco è in produzione, calcola la fine
  // basata sui giri reali e segnala se sfora di > 1h sul successivo
  const stima = stimaFineLive(p);
  const stimaWarn = stima && stima.sforaCritico;
  const b = document.createElement('div');
  b.className = 'fase big' + (warn || stimaWarn ? ' warn' : '');
  b.draggable = true;
  b.dataset.pianif = p.id;
  b.dataset.tipo = 'kba';
  b.style.top = (start*PX_H)+'px';
  b.style.height = heightPx + 'px';
  b.style.borderColor = pal.bd;
  b.style.color = pal.fg;
  if(fermiOre > 0){
    const frac = Math.round((durTeor / durTot) * 100);
    b.style.background =
      `linear-gradient(to bottom, ${pal.bg} 0%, ${pal.bg} ${frac}%, #FEE2E2 ${frac}%, #FCA5A5 100%)`;
  } else {
    b.style.background = pal.bg;
  }
  // progresso
  let prog = 0, giri = 0;
  const act = S.prodActive['kba'+p.kba_lane];
  if(act && act.commessaId == p.cartellino_id && act.segnId == p.segnatura_idx+1){
    giri = act.avanz || 0;
    if(copie > 0) prog = Math.min(100, giri*100/copie);
  } else if(p.prod_giri_fatti && copie){
    giri = p.prod_giri_fatti;
    prog = Math.min(100, giri*100/copie);
  } else if(now >= start){
    prog = Math.min(100, Math.max(0, (now-start)/durTeor*100));
  }
  const rip = p.split_from_id ? '<div class="ripresa-ico">ripresa</div>' : '';
  const fermiLbl = fermiOre > 0 ? ` <span style="color:#991B1B">+${fmtH(fermiOre)} fermo</span>` : '';
  const segInfo = `s${p.segnatura_idx+1} · ${fmt}° · ${carta}`;
  const copieInfo = `${copie.toLocaleString('it')} cp · ${fmtH(durTeor)}`;
  // Etichetta stima dinamica (solo se in produzione e con dati affidabili)
  let stimaLbl = '';
  let stimaLblCompact = '';
  if(stima){
    const fineStr = fmtDT(stima.fineStim);
    if(stima.overlap > 0){
      const colore = stima.sforaCritico ? '#991B1B' : '#A16207';
      stimaLbl       = `<div class="mm" style="color:${colore};font-weight:500">⏱ stim. fine ${fineStr} (+${fmtH(stima.overlap)} sforo)</div>`;
      stimaLblCompact = ` · <span style="color:${colore}">stim. ${fineStr} +${fmtH(stima.overlap)}</span>`;
    } else {
      stimaLbl       = `<div class="mm" style="color:#15803D">⏱ stim. fine ${fineStr}</div>`;
      stimaLblCompact = ` · <span style="color:#15803D">stim. ${fineStr}</span>`;
    }
  }

  // Layout adattivo in base all'altezza del box:
  //   < 34px  → solo titolo su una riga
  //   < 60px  → titolo + dettagli compatti su una sola riga accanto
  //   < 100px → 2 righe (titolo / dettagli inline), niente progress bar
  //   >= 100px → layout pieno
  let html;
  if(heightPx < 34){
    html = `${rip}<div class="tt inline">${nome} · ${segInfo}</div>`;
  } else if(heightPx < 60){
    html = `${rip}
      <div class="row-inline">
        <span class="tt">${nome}</span>
        <span class="mm">· ${segInfo} · ${copieInfo}${fermiLbl}${stimaLblCompact}</span>
      </div>`;
  } else if(heightPx < 100){
    html = `${rip}
      <div class="tt">${nome}</div>
      <div class="mm">${segInfo} · ${copieInfo}${fermiLbl}${stimaLblCompact}</div>`;
  } else {
    const pbContainerW = durTot > durTeor ? (durTeor / durTot) * 100 : 100;
    html = `${rip}
      <div class="tt">${nome}</div>
      <div class="mm">${segInfo}</div>
      <div class="mm">${copieInfo}${fermiLbl}</div>
      ${stimaLbl}
      ${prog>0 && prog<100 ? `<div class="pb" style="background:${pal.base};width:${pbContainerW}%"><div style="height:100%;width:${prog}%;background:${pal.fill}"></div></div>` : ''}`;
  }
  b.innerHTML = html;
  b.addEventListener('contextmenu', e => {
    e.preventDefault();
    showMenu(e.clientX, e.clientY, p.id);
  });
  attachFaseDrag(b, p.id, 'kba');
  tk.appendChild(b);
}

// ═══ Drop logic ═══════════════════════════════════════════════════
function dropHour(tk, clientY){
  const r = tk.getBoundingClientRect();
  let h = (clientY - r.top) / PX_H;
  h = Math.round(h*4) / 4;
  return Math.max(0, Math.min(DAY_COUNT*24 - 0.25, h));
}
function defaultTimes(tkKind, hour){
  let kba, inc, af;
  let shifted = false;
  if(tkKind === 'kba'){
    // Se droppato dentro un turno chiuso, sposta la kba dopo la chiusura
    const h2 = shiftIfInClosed(hour);
    if(h2 !== hour) shifted = true;
    hour = h2;
    kba = hour; inc = hour - 1; af = hour - 1.5;
  }
  else if(tkKind === 'inc'){ inc = hour; af = hour - 0.5; kba = hour + 1; }
  else { af = hour; inc = hour + 0.5; kba = hour + 1.5; }
  // Sposta kba avanti anche negli altri casi se cade in chiusura
  if(tkKind !== 'kba'){
    const k2 = shiftIfInClosed(kba);
    if(k2 !== kba) shifted = true;
    kba = k2;
  }
  af  = Math.max(0, af);
  inc = Math.max(DUR_AF, inc);
  kba = Math.max(DUR_AF + DUR_INC, kba);
  if(shifted) toast('Spostato fuori dal turno chiuso');
  return {af_start: isoFromH(af), inc_start: isoFromH(inc), kba_start: isoFromH(kba)};
}

async function dropBasketSeg(d, tkKind, tkLane, hour){
  const t = defaultTimes(tkKind, hour);
  const row = await createPianif({
    cartellino_id: d.cartellino_id,
    segnatura_idx: d.segnatura_idx,
    af_start: t.af_start, inc_start: t.inc_start,
    kba_start: t.kba_start, kba_lane: tkLane || 1
  });
  if(row) S.pianificazioni.push(row);
  renderAll();
}
async function dropBasketRip(d, tkKind, tkLane, hour){
  const p = S.pianificazioni.find(x => x.id === d.pianifId);
  if(!p) return;
  const t = defaultTimes(tkKind, hour);
  await updatePianif(p, {af_start:t.af_start, inc_start:t.inc_start, kba_start:t.kba_start, kba_lane:tkLane||1});
  renderAll();
}
async function dropFase(d, tkKind, tkLane, hour){
  const p = S.pianificazioni.find(x => x.id === d.pianifId);
  if(!p) return;
  const patch = {};
  if(d.tipo === 'af')  patch.af_start  = isoFromH(hour);
  if(d.tipo === 'inc') patch.inc_start = isoFromH(hour);
  if(d.tipo === 'kba'){
    const hShifted = shiftIfInClosed(hour);
    if(hShifted !== hour) toast('Spostato fuori dal turno chiuso');
    hour = hShifted;
    patch.kba_start = isoFromH(hour);
    if(tkLane) patch.kba_lane = tkLane;
  }
  await updatePianif(p, patch);
  renderAll();
}

qa('.col.tk').forEach(tk => {
  const kind = tk.dataset.lane ? 'kba' : tk.dataset.tipo;
  const lane = tk.dataset.lane ? parseInt(tk.dataset.lane) : null;
  tk.addEventListener('dragover', e => {
    if(!S.drag) return;
    if(S.drag.kind === 'fase'){
      const compat = (kind==='kba' && S.drag.tipo==='kba') || (kind === S.drag.tipo);
      if(!compat) return;
    }
    e.preventDefault();
    tk.classList.add('ov');
    e.dataTransfer.dropEffect = 'move';
  });
  tk.addEventListener('dragleave', ()=>tk.classList.remove('ov'));
  tk.addEventListener('drop', e => {
    tk.classList.remove('ov');
    if(!S.drag) return;
    // Sottraggo l'offset Y del click iniziale: così il blocco si ferma
    // esattamente dove l'utente lo lascia, considerando il punto di presa.
    const offY = S.drag.offsetY || 0;
    const hour = dropHour(tk, e.clientY - offY);
    const d = S.drag; S.drag = null;
    if(d.kind === 'basket_seg'){ e.preventDefault(); dropBasketSeg(d, kind, lane, hour); }
    else if(d.kind === 'basket_rip'){ e.preventDefault(); dropBasketRip(d, kind, lane, hour); }
    else if(d.kind === 'fase'){
      const compat = (kind==='kba' && d.tipo==='kba') || (kind === d.tipo);
      if(!compat) return;
      e.preventDefault();
      dropFase(d, kind, lane, hour);
    }
  });
});

async function returnToBasket(pianifId){
  const p = S.pianificazioni.find(x => x.id === pianifId);
  if(!p) return;
  if(p.split_from_id){
    // È una ripresa: azzera prima le sue fasi (esce dalla timeline)
    await updatePianif(p, {af_start:null, inc_start:null, kba_start:null, kba_lane:null});

    // FUSIONE: se nel basket esistono già altre riprese della stessa
    // segnatura, le fondo in p sommando le copie. Le altre vengono eliminate.
    const altre = S.pianificazioni.filter(x =>
      x.id !== p.id &&
      x.cartellino_id === p.cartellino_id &&
      x.segnatura_idx === p.segnatura_idx &&
      x.split_from_id &&             // anche le altre devono essere riprese
      x.kba_start == null &&         // nel basket (no fasi piazzate)
      x.af_start  == null &&
      x.inc_start == null &&
      x.prod_stato !== 'completato' &&
      x.prod_stato !== 'annullato'
    );
    if(altre.length > 0){
      const totale = (p.split_copie || 0)
        + altre.reduce((s,x) => s + (x.split_copie || 0), 0);
      await updatePianif(p, {split_copie: totale});
      const idsRimossi = altre.map(x => x.id);
      S.pianificazioni = S.pianificazioni.filter(x => !idsRimossi.includes(x.id));
      for(const id of idsRimossi){
        try{ await deletePianif(id); }catch(e){ console.warn('delete fuso', e); }
      }
      toast(`${altre.length+1} riprese fuse · ${totale.toLocaleString('it')} cp`);
    }

    renderAll();
    return;
  }
  // È una "madre": elimino TUTTE le pianificazioni della stessa segnatura
  // (madre + tutte le riprese figlie). Così la segnatura torna intera nel
  // basket, con le copie totali originali prese dal cartellino tecnico.
  const fratelli = S.pianificazioni.filter(x =>
    x.cartellino_id === p.cartellino_id &&
    x.segnatura_idx === p.segnatura_idx
  );
  const ids = fratelli.map(x => x.id);
  S.pianificazioni = S.pianificazioni.filter(x => !ids.includes(x.id));
  renderAll();
  for(const id of ids){ await deletePianif(id); }
}

        S.pianificazioni.push(ripresa);

      renderAll();

    durFn: (rimaste) => durKba(carta, fmt, rimaste)
  });

let _splitOnConfirm = null, _splitOrig = 0, _splitDurFn = null;
function openSplitModal({title, sub, copieOrig, onConfirm, durFn}){
  $('splitTitle').textContent = title;
  $('splitSub').textContent = sub;
  $('splitTot').textContent = copieOrig.toLocaleString('it');
  $('splitInput').value = '';
  $('splitRem').textContent = '—';
  $('splitDur').textContent = '—';
  $('splitErr').textContent = '';
  $('splitOk').disabled = true;
  _splitOnConfirm = onConfirm;
  _splitOrig = copieOrig;
  _splitDurFn = durFn;
  $('splitBg').classList.add('on');
  setTimeout(()=>$('splitInput').focus(), 50);
}
function closeSplitModal(){
  $('splitBg').classList.remove('on');
  _splitOnConfirm = null;
}
function updateSplitPreview(){
  const raw = $('splitInput').value.replace(/[\s.]/g,'');
  const n = parseInt(raw, 10);
  const err = $('splitErr');
  const ok = $('splitOk');
  if(!raw){
    $('splitRem').textContent = '—';
    $('splitDur').textContent = '—';
    err.textContent = '';
    ok.disabled = true;
    return;
  }
  if(isNaN(n) || n <= 0){
    err.textContent = 'Inserisci un numero maggiore di 0';
    ok.disabled = true;
    return;
  }
  if(n >= _splitOrig){
    err.textContent = `Devi inserire un numero minore di ${_splitOrig.toLocaleString('it')}`;
    ok.disabled = true;
    return;
  }
  const rimaste = _splitOrig - n;
  $('splitRem').textContent = rimaste.toLocaleString('it');
  $('splitDur').textContent = _splitDurFn ? fmtH(_splitDurFn(rimaste)) : '—';
  err.textContent = '';
  ok.disabled = false;
}
$('splitInput').addEventListener('input', updateSplitPreview);
$('splitInput').addEventListener('keydown', e => {
  if(e.key === 'Enter' && !$('splitOk').disabled){ e.preventDefault(); $('splitOk').click(); }
  if(e.key === 'Escape'){ e.preventDefault(); closeSplitModal(); }
});
$('splitCancel').addEventListener('click', closeSplitModal);
$('splitBg').addEventListener('click', e => { if(e.target === $('splitBg')) closeSplitModal(); });
$('splitOk').addEventListener('click', async () => {
  const raw = $('splitInput').value.replace(/[\s.]/g,'');
  const n = parseInt(raw, 10);
  if(isNaN(n) || n <= 0 || n >= _splitOrig) return;
  const cb = _splitOnConfirm;
  closeSplitModal();
  if(cb) await cb(n);
});

  m.addEventListener('click', e=>{

    if(a === 'chiudi') doChiudiTurno(dayIdx, turno);

    hideMenu();
  });

async function doChiudiTurno(dayIdx, turno){
  const [rgS, rgE] = turnoRange(dayIdx, turno);
  // data del giorno in YMD LOCALE (evita shift timezone di toISOString)
  const giorno = toYMD(new Date(S.weekStart.getTime() + dayIdx*86400000));
  // 1) split/sposta pianificazioni KBA che intersecano il range
  const lanes = S.pianificazioni.filter(p => p.kba_start && p.kba_lane);
  for(const p of lanes){
    const ct = ctById(p.cartellino_id);
    if(!ct) continue;
    const seg = (ct.segnature || [])[p.segnatura_idx];
    if(!seg) continue;
    const copie = p.split_copie || ct.tiraturaRich || 0;
    const s = hFromISO(p.kba_start);
    const d = durKba(cartaOf(ct), seg.fol, copie);
    const e = s + d;
    if(e <= rgS || s >= rgE) continue; // fuori range → nessuna azione
    if(s < rgS && e > rgS){
      // Caso A: attraversa l'inizio della chiusura → SPLIT a rgS
      // copie fatte fino a rgS: se rgS è dentro l'avvio, 0; altrimenti proporzionale
      let fatte;
      if(rgS <= s + 1.5){
        fatte = 0;
      } else {
        const oreStampa = rgS - s - 1.5;
        fatte = Math.round(oreStampa * cph(cartaOf(ct), seg.fol));
      }
      fatte = Math.max(0, Math.min(copie - 1, fatte));
      const rimaste = copie - fatte;
      if(fatte > 0){
        await updatePianif(p, {split_copie: fatte});
      } else {
        // nessuna copia fatta: meglio spostare tutto dopo rgE
        await updatePianif(p, {kba_start: isoFromH(rgE)});
        continue;
      }
      await createPianif({
        cartellino_id: p.cartellino_id,
        segnatura_idx: p.segnatura_idx,
        af_start: null, inc_start: null, kba_start: null, kba_lane: null,
        split_copie: rimaste,
        split_from_id: p.id
      }).then(r => { if(r) S.pianificazioni.push(r); });
    } else {
      // Caso B/C: inizia dentro o dopo rgS ma overlappa → sposta tutto a rgE
      await updatePianif(p, {kba_start: isoFromH(rgE)});
    }
  }
  // 2) inserisco la chiusura (dopo, così se fallisce non ho già splittato inutilmente)
  try{
    await sbInsert('progr_turni_chiusi', {giorno, turno, motivo: null});
  }catch(e){
    // UNIQUE violation → probabilmente già chiuso, ignoro
    console.warn('chiusura già esistente', e);
  }
  await loadAll();
  toast(`${turno} turno chiuso`);
}

async function doRiapriTurno(dayIdx, turno){
  const giorno = toYMD(new Date(S.weekStart.getTime() + dayIdx*86400000));
  const row = S.turniChiusi.find(x => giornoFromDate(x.giorno) === dayIdx && x.turno === turno);
  if(!row) return;
  try{
    await sbDelete('progr_turni_chiusi', row.id);
    S.turniChiusi = S.turniChiusi.filter(x => x.id !== row.id);
    renderAll();
    toast(`${turno} turno riaperto`);
  }catch(e){
    console.error('riapri turno', e);
    toast('Errore riapertura: '+e.message, true);
  }
}

};

// ═══ Orologio + polling live ══════════════════════════════════════
function tickClock(){ $('tb-clock').textContent = fmtClock(new Date()); }
setInterval(tickClock, 1000);
// tick frequente: rirenderizza fasi (così box con fermo in corso crescono)
//                 + aggiorna NOW line
// Ottimizzazione: salta se tab nascosta (risparmia CPU/memoria quando in background)
setInterval(()=>{
  if(document.hidden) return;
  renderNow();
  // Rerender fasi solo se c'è almeno una KBA in fermo, per evitare spam
  const fermoInCorso = Object.values(S.prodActive).some(a => a && a.stato === 'fermo');
  if(fermoInCorso) renderFasi();
}, 5000);
setInterval(refreshLive, POLL_MS);

// Quando l'utente torna sulla tab dopo averla lasciata nascosta, forza un refresh
// immediato invece di aspettare il prossimo ciclo di POLL_MS.
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){
    console.log('[visibility] tab tornata visibile, refresh immediato');
    refreshLive();
  }
});

// ═══ Init ═════════════════════════════════════════════════════════
S.weekStart = getMonday();
setHeights();
tickClock();
renderHero();
loadAll().then(()=>{
  setTimeout(()=>{
    setHeights(); // ricalcolo le altezze dopo che il basket si è popolato
    const tlTop = tlbody.getBoundingClientRect().top + window.scrollY;
    window.scrollTo({top: Math.max(0, tlTop + nowH()*PX_H - 180)});
  }, 100);
});

})();
</script>
</body>
</html>
